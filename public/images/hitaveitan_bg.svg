<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" width="1920" height="1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&amp;display=swap');
      .title {
        font-family: 'Cinzel', 'DejaVu Serif', 'Trajan Pro', 'Times New Roman', serif;
        font-weight: 900;
        letter-spacing: 0.08em;
      }
      .subtitle {
        font-family: 'Cinzel', 'DejaVu Serif', serif;
        font-weight: 700;
        letter-spacing: 0.5em;
      }
    </style>

    <radialGradient id="sky" cx="50%" cy="35%" r="90%">
      <stop offset="0%"   stop-color="#321a52"/>
      <stop offset="30%"  stop-color="#1d0a35"/>
      <stop offset="65%"  stop-color="#0a0414"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <radialGradient id="felNebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#b6ff70" stop-opacity="0.6"/>
      <stop offset="35%"  stop-color="#3aff14" stop-opacity="0.32"/>
      <stop offset="70%"  stop-color="#0a4d0a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="felCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#d6ff8a" stop-opacity="0.85"/>
      <stop offset="25%"  stop-color="#3aff14" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#0a4d0a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="fireRise" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#ffc163" stop-opacity="0.78"/>
      <stop offset="10%"  stop-color="#ff7a26" stop-opacity="0.62"/>
      <stop offset="30%"  stop-color="#b3290a" stop-opacity="0.32"/>
      <stop offset="60%"  stop-color="#3d0a0a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="crystal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d6ff8a" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#3aff14" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#0a3a0a" stop-opacity="0.35"/>
    </linearGradient>

    <filter id="blurXL" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="blurL" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="blurM" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="blurS" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
    </radialGradient>

    <symbol id="shard" viewBox="0 0 100 160">
      <polygon points="50,5 85,40 78,140 22,150 15,40" fill="url(#crystal)" stroke="#b6ff70" stroke-width="1.2" stroke-opacity="0.7"/>
      <polygon points="50,5 78,140 22,150 15,40" fill="#000" fill-opacity="0.15"/>
      <line x1="50" y1="5" x2="50" y2="148" stroke="#d6ff8a" stroke-width="0.8" stroke-opacity="0.6"/>
    </symbol>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>

  <ellipse cx="380"  cy="240" rx="520" ry="260" fill="url(#felNebula)" opacity="0.6"/>
  <ellipse cx="1560" cy="200" rx="560" ry="280" fill="url(#felNebula)" opacity="0.5"/>
  <ellipse cx="960"  cy="540" rx="900" ry="420" fill="url(#felNebula)" opacity="0.85"/>

  <ellipse cx="960" cy="540" rx="650" ry="280" fill="url(#felCore)"/>

  <g opacity="0.22" stroke="#b6ff70" fill="none" transform="translate(960,540)">
    <circle r="420" stroke-width="1.5"/>
    <circle r="380" stroke-width="0.6" stroke-dasharray="3 7"/>
    <circle r="340" stroke-width="0.8"/>
    <circle r="290" stroke-width="0.5" stroke-dasharray="2 5"/>
    <circle r="240" stroke-width="0.5"/>
    <g stroke-width="0.5">
      <line x1="-420" y1="0"    x2="420"   y2="0"/>
      <line x1="-297" y1="-297" x2="297"  y2="297"/>
      <line x1="0"    y1="-420" x2="0"    y2="420"/>
      <line x1="297"  y1="-297" x2="-297" y2="297"/>
    </g>
    <g stroke-width="2.5">
      <line x1="420" y1="0" x2="448" y2="0"/>
      <line x1="-420" y1="0" x2="-448" y2="0"/>
      <line x1="0" y1="420" x2="0" y2="448"/>
      <line x1="0" y1="-420" x2="0" y2="-448"/>
      <line x1="297" y1="297" x2="317" y2="317"/>
      <line x1="-297" y1="297" x2="-317" y2="317"/>
      <line x1="297" y1="-297" x2="317" y2="-317"/>
      <line x1="-297" y1="-297" x2="-317" y2="-317"/>
    </g>
    <g fill="#3aff14" stroke="none">
      <circle cx="240" cy="0" r="3"/>
      <circle cx="-240" cy="0" r="3"/>
      <circle cx="0" cy="240" r="3"/>
      <circle cx="0" cy="-240" r="3"/>
      <circle cx="170" cy="170" r="2"/>
      <circle cx="-170" cy="170" r="2"/>
      <circle cx="170" cy="-170" r="2"/>
      <circle cx="-170" cy="-170" r="2"/>
    </g>
  </g>

  <rect x="0" y="430" width="1920" height="650" fill="url(#fireRise)"/>

  <use href="#shard" x="40"   y="160" width="110" height="170" opacity="0.85"/>
  <use href="#shard" x="180"  y="380" width="80"  height="130" opacity="0.7" transform="rotate(-8 220 445)"/>
  <use href="#shard" x="60"   y="660" width="95"  height="150" opacity="0.8" transform="rotate(6 107 735)"/>
  <use href="#shard" x="240"  y="780" width="65"  height="105" opacity="0.6" transform="rotate(-12 272 832)"/>
  <use href="#shard" x="320"  y="190" width="50"  height="80"  opacity="0.55" transform="rotate(15 345 230)"/>
  <use href="#shard" x="380"  y="540" width="40"  height="65"  opacity="0.45" transform="rotate(-20 400 572)"/>
  <use href="#shard" x="1770" y="150" width="115" height="180" opacity="0.85" transform="rotate(8 1827 240)"/>
  <use href="#shard" x="1660" y="390" width="80"  height="130" opacity="0.7" transform="rotate(10 1700 455)"/>
  <use href="#shard" x="1810" y="660" width="95"  height="150" opacity="0.8" transform="rotate(-6 1857 735)"/>
  <use href="#shard" x="1620" y="790" width="65"  height="105" opacity="0.6" transform="rotate(14 1652 842)"/>
  <use href="#shard" x="1550" y="200" width="50"  height="80"  opacity="0.55" transform="rotate(-15 1575 240)"/>
  <use href="#shard" x="1500" y="540" width="40"  height="65"  opacity="0.45" transform="rotate(20 1520 572)"/>

  <g>
    <circle cx="180"  cy="900" r="3.5" fill="#ffd28a"/>
    <circle cx="320"  cy="850" r="2.5" fill="#ff8c33"/>
    <circle cx="450"  cy="940" r="4"   fill="#ffb347"/>
    <circle cx="600"  cy="800" r="2"   fill="#ff6a1a"/>
    <circle cx="780"  cy="880" r="3"   fill="#ffd28a"/>
    <circle cx="900"  cy="780" r="2"   fill="#ff8c33"/>
    <circle cx="1020" cy="850" r="3.5" fill="#ffb347"/>
    <circle cx="1180" cy="920" r="2.5" fill="#ff6a1a"/>
    <circle cx="1340" cy="800" r="4"   fill="#ffd28a"/>
    <circle cx="1480" cy="880" r="2.5" fill="#ff8c33"/>
    <circle cx="1620" cy="940" r="3"   fill="#ffb347"/>
    <circle cx="1760" cy="830" r="2"   fill="#ff6a1a"/>
    <circle cx="250"  cy="700" r="2.5" fill="#ffd28a" opacity="0.7"/>
    <circle cx="540"  cy="660" r="2"   fill="#ff8c33" opacity="0.7"/>
    <circle cx="850"  cy="620" r="1.5" fill="#ffb347" opacity="0.6"/>
    <circle cx="1180" cy="650" r="2"   fill="#ff8c33" opacity="0.7"/>
    <circle cx="1480" cy="690" r="2"   fill="#ffd28a" opacity="0.7"/>
    <circle cx="1700" cy="640" r="1.5" fill="#ff6a1a" opacity="0.6"/>
    <circle cx="700"  cy="500" r="1.5" fill="#b6ff70" opacity="0.7"/>
    <circle cx="1240" cy="480" r="1.5" fill="#b6ff70" opacity="0.7"/>
    <circle cx="500"  cy="450" r="1"   fill="#b6ff70" opacity="0.6"/>
    <circle cx="1420" cy="430" r="1"   fill="#b6ff70" opacity="0.6"/>
  </g>

  <g stroke="#b6ff70" fill="none">
    <line x1="540" y1="430" x2="850" y2="430" stroke-width="2" opacity="0.75"/>
    <line x1="1070" y1="430" x2="1380" y2="430" stroke-width="2" opacity="0.75"/>
    <polygon points="960,418 977,430 960,442 943,430" fill="#3aff14" stroke="none"/>
    <line x1="540" y1="668" x2="850" y2="668" stroke-width="2" opacity="0.75"/>
    <line x1="1070" y1="668" x2="1380" y2="668" stroke-width="2" opacity="0.75"/>
    <polygon points="960,656 977,668 960,680 943,668" fill="#3aff14" stroke="none"/>
    <line x1="540" y1="430" x2="540" y2="450" stroke-width="2" opacity="0.6"/>
    <line x1="1380" y1="430" x2="1380" y2="450" stroke-width="2" opacity="0.6"/>
    <line x1="540" y1="668" x2="540" y2="648" stroke-width="2" opacity="0.6"/>
    <line x1="1380" y1="668" x2="1380" y2="648" stroke-width="2" opacity="0.6"/>
  </g>

  <text x="960" y="585" text-anchor="middle" class="title"
        font-size="180" fill="#3aff14" filter="url(#blurXL)" opacity="0.95">HITAVEITAN</text>
  <text x="960" y="585" text-anchor="middle" class="title"
        font-size="180" fill="#7eff3a" filter="url(#blurL)" opacity="0.85">HITAVEITAN</text>
  <text x="960" y="585" text-anchor="middle" class="title"
        font-size="180" fill="#b6ff70" filter="url(#blurM)" opacity="0.9">HITAVEITAN</text>
  <text x="960" y="585" text-anchor="middle" class="title"
        font-size="180" fill="#eaffd9">HITAVEITAN</text>
  <text x="960" y="582" text-anchor="middle" class="title"
        font-size="180" fill="#ffffff" opacity="0.35" filter="url(#blurS)">HITAVEITAN</text>

  <text x="960" y="715" text-anchor="middle" class="subtitle"
        font-size="22" fill="#b6ff70" opacity="0.9">·  WORLD  OF  WARCRAFT  ·</text>

  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
